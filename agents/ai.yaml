01-pr-comment-process:

  1of7-global-rules:
    - Use GH_TOKEN for all `gh` commands.
    - Post all PR comments directly via `gh api` (inline-reply and top-level endpoints). The former proxy workflow (`action-proxy-reviewer-bot-comment.yml`) and its handler have been archived; the direct-API path works universally and does not depend on cross-repo reusable-workflow access.
    - Include the `from 🤖: <emoji> ...` attribution prefix in the comment body itself (see 3of9); comments post from the acting user's account.
    - Do not create branches.
    - All changes land on the PR branch.
    - Query all required APIs.
    - If a comment contains structured AI agent prompts, follow them when making the fix.
    - Never use `@coderabbitai review`, that triggers a full new review. Just @coderabbitai is enough to get it's notice for incremental checks.
    - Shortcuts if you need them:
      exec-inline-reply: |
        ```bash
        # Reply to an inline review comment (keeps the thread inline)
        gh api repos/{owner}/{repo}/pulls/{pr_number}/comments/{comment_id}/replies \
          -f body='from 🤖: {emoji} {response text}'
        ```
      exec-top-level: |
        ```bash
        # New top-level PR comment (issue-comments endpoint; PRs are issues)
        gh api repos/{owner}/{repo}/issues/{pr_number}/comments \
          -f body='from 🤖: {emoji} {response text}'
        ```
  
  2of7-find-every-pr-comment-query-all-three-locations:  # Deduplicate by comment ID.

    2.1of7-pr-level-comments:
      exec: |
        ```bash
        gh api repos/{owner}/{repo}/issues/{pr_number}/comments \
          --paginate \
          --jq '.[] | {id, user: .user.login, body, updated_at}'
        ```

    2.2of7-standalone-inline-comments:
      exec: |
        ```bash
        gh api repos/{owner}/{repo}/pulls/{pr_number}/comments \
          --paginate \
          --jq '.[] | {id, user: .user.login, path, line, body, updated_at}'
        ```

    2.3of7-review-comments:
      2.3.1of7-get-review-ids-and-bodies:
        exec: |
          ```bash
          gh api repos/{owner}/{repo}/pulls/{pr_number}/reviews \
            --paginate \
            --jq '.[] | {id, user: .user.login, state: .state, body, submitted_at}'
          ```

      2.3.2of7-get-comments-per-review-id:
        exec: |
          ```bash
          gh api repos/{owner}/{repo}/pulls/{pr_number}/reviews/{review_id}/comments \
            --paginate \
            --jq '.[] | {id, path, position, body, updated_at}'
          ```

      2.3.3of7-parse-review-body-for-embedded-suggestions:  # Each embedded suggestion counts as a comment that requires a response.
        outside-diff-range: >
          Some review tools (e.g., CodeRabbit) embed "outside diff range" suggestions
          directly in the review body rather than as child comments. These won't appear
          in 2.3.2 results. If a review body is non-empty and contains
          suggestions, file references, or proposed diffs, extract and treat each as a
          separate actionable item tied to the review ID.
        look-for:
          - '"Outside diff range comments" sections'
          - File-scoped <details>/<summary> blocks with line ranges and diffs
          - Proposed fix blocks (```diff)

    2.4of7-normalize:
      - Combine results from 2.1, 2.2, 2.3
      - Deduplicate by comment ID
      - Process all comments
      - Treat multiple suggestions separately

    2.5of7-ai-agent-prompt-extraction:
      - Comments may contain structured prompts intended specifically for AI agents.
      - These prompts provide primary implementation instructions for fixes.
      - Preserve any explicit constraints in the prompt (paths, line ranges, keep/avoid changes, keep messages, exit codes, etc.).
      - If the prompt conflicts with repo reality, explain and choose the closest safe interpretation in your response.
      - "Example format (CodeRabbit): A section titled \"🤖 Prompt for AI Agents\" containing detailed instructions."

  3of7-decide-action-choose-one:
    validate: "from 🤖: 👍"
    already-fixed: "from 🤖: 😎 Already fixed! Commit {link}"
    wont-do: "from 🤖: 🚫 Won't do because {reason}"  # {reason} must be SIGNIFICANT. "It's a big change/It'll touch a lot/etc." are UNACCEPTABLE. Don't be lazy.
    fix-applied: "from 🤖: ✅ Fixed it! Commit {link}"

  4of7-confirm-single-top-level:  # Post a new top-level comment summarizing all responses.
    exec: |
      ```bash
      gh api repos/{owner}/{repo}/issues/{pr_number}/comments \
        -f body='{confirmation text}'
      ```
    content: |
      from 🤖 to @coderabbitai:
      - Comment 1 {id} {descriptive title}: {validate👍|already-fixed😎)|wont-do🚫)|fix-applied✅} Commit {link}
      - Comment 2 {id} {descriptive title}: {validate👍|already-fixed😎)|wont-do🚫)|fix-applied✅} Commit {link}
      - Comment 3 {id}...

      Please confirm all issues are resolved or explained.

  5of7-follow-ups:
    - Every minute for up to 5 minutes check for CodeRabbit to respond.
    - Repeat for new comments.

  6of7-user-review-wontdos:
    Give the user the list of items that were marked won't do and why: |
      1: Won't do 1: {wont-do🚫} {2+ sentences reason why}

      1? »

      2: Won't do 2: {wont-do🚫} {2+ sentences reason why}

      2? »

      3: ...

  7of7-reassertions:
    - Use GH_TOKEN for access
    - You are NOT done until every comment has a response
    - Follow structured AI agent prompts when present, e.g., '🤖 Prompt for AI Agents'

